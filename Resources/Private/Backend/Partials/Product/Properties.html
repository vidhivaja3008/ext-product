<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<table class="tx-nitsan-product" >
	<tr>
		<td><f:translate key="tx_nitsanproduct_domain_model_product.name" /></td>
		<td>{product.name}</td>
	</tr>
	<tr>
		<td><f:translate key="tx_nitsanproduct_domain_model_product.description" /></td>
		<td>{product.description}</td>
	</tr>
	<tr>
		<td><f:translate key="tx_nitsanproduct_domain_model_product.image" /></td>
		<td>
			<f:if condition="{product.image}">
				<f:image image="{product.image}" width="300" />
			</f:if>
			
		</td>
	</tr>
	<tr>
		<td><f:translate key="tx_nitsanproduct_domain_model_product.price" /></td>
		<td>{product.price}</td>
	</tr>
</table>
</html>
