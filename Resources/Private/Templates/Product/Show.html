<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="content">
    <h1>Single View for Product</h1>
    <f:flashMessages />
    <f:render partial="Product/Properties" arguments="{product:product}" />
    <f:if condition="{settings.listPageId}">
        <f:link.action action="list" pageUid="{settings.listPageId}">Back to list</f:link.action><br />
    </f:if>
</f:section>
</html>
